workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        BUNDLE_ID: "com.sabdev.namazapp"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Copier le son adhan dans le bundle iOS
        script: cp assets/audio/adhan/adhan.mp3 ios/Runner/adhan.mp3

      - name: Installer les dépendances Flutter
        script: flutter pub get

      - name: Installer les pods iOS
        script: |
          cd ios
          pod repo update
          pod install

      - name: Build iOS release
        script: flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app

    publishing:
      email:
        recipients:
          - ssab55800@gmail.com
        notify:
          success: true
          failure: true

workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.sabdev.namazapp" # ← changez si vous avez choisi un autre ID
      vars:
        BUNDLE_ID: "com.sabdev.namazapp"        # ← idem ici
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Copier le son adhan dans le bundle iOS
        script: cp assets/audio/adhan/adhan.mp3 ios/Runner/adhan.mp3

      - name: Installer les dépendances Flutter
        script: flutter pub get

      - name: Installer les pods iOS
        script: |
          cd ios
          pod repo update
          pod install

      - name: Vérifier la configuration Flutter
        script: flutter doctor -v

      - name: Build iOS release
        script: |
          flutter build ios --release --no-codesign

      - name: Archive et signer avec Xcode
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true   # envoie sur TestFlight automatiquement
        submit_to_app_store: false   # passez à true quand prêt pour production
